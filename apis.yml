aid: longhorn
name: Longhorn
description: >-
  Longhorn is a CNCF incubating lightweight, reliable, and easy-to-use
  distributed block storage system for Kubernetes. It creates a dedicated
  storage controller for each volume and replicates data across multiple
  nodes for high availability. Longhorn supports snapshots, backups to
  S3-compatible storage, disaster recovery, and recurring backup schedules.
url: https://longhorn.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Block Storage
- Kubernetes
- Persistent Volumes
- Backup
- Cloud Native
- Incubating
created: '2026-03-16'
modified: '2026-03-18'
