apis:
- aid: longhorn:longhorn-api
  name: Longhorn Manager API
  description: >-
    The Longhorn Manager exposes a REST API for volume lifecycle management
    including creating, attaching, detaching, and deleting volumes. It also
    provides endpoints for snapshot management, backup operations, node
    management, engine image management, and system settings configuration.
    The API is used by the Longhorn UI and can be accessed directly for
    automation.
  humanURL: https://longhorn.io/docs/
